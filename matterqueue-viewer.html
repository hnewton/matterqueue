          absorbing.body = MQ.applyBodyAppends(absorbing.body, { decisionLog:[`**${MQ.todayISO()}** — ${esc(md.frontMatter.name)} absorbed into this concept. See ${filename} for full history.`], actionLog:[], openQuestionsLog:[] });
          markDirty(absorbing.filename);
        }
        renderConceptOverview();
      }},{label:'Cancel',fn:()=>renderConceptOverview()}] });
    return;
  }
  if (newState === 'retired') {
    showModal({ title:'Mark as retired', body:`Mark <strong>${esc(md.frontMatter.name)}</strong> as retired? This is a clean close — nothing carries forward.`,
      actions:[{label:'Confirm',type:'danger',fn:()=>{md.frontMatter.state='retired';markDirty(filename);renderConceptOverview();}},{label:'Cancel',fn:()=>renderConceptOverview()}] });
    return;
  }
  md.frontMatter.state = newState;
  markDirty(filename);
}

function updateActionField(filename, idx, field, value) {
  const md = App.mds[filename];
  if (!md?.frontMatter?.actions) return;
  md.frontMatter.actions[idx][field] = value;
  markDirty(filename);
}

function handleActionStateChange(filename, idx, newState) {
  const md = App.mds[filename];
  if (!md) return;
  const action = md.frontMatter.actions[idx];
  action.state = newState;
  markDirty(filename);
  if (newState === 'done') {
    if (action.type === 'prototype') { md.frontMatter.try_it = true;
      showModal({title:'Prototype complete',body:'Add a result note?',input:{placeholder:'What did it reveal?'},
        actions:[{label:'Add',type:'primary',fn:(v)=>{if(v&&md.body.includes('## Action Log')){md.body=MQ.applyBodyAppends(md.body,{actionLog:[`**${MQ.todayISO()}** — Prototype: ${v}`],decisionLog:[],openQuestionsLog:[]});markDirty(filename);}}},{label:'Skip',fn:()=>{}}]}); }
    if (action.type === 'research') md.frontMatter.map_it = true;
    if (action.type === 'decision') {
      showModal({title:'Decision recorded',body:'Add a Decision Log entry?',input:{placeholder:'What was decided?'},
        actions:[{label:'Add',type:'primary',fn:(v)=>{if(v&&md.body.includes('## Decision Log')){md.body=MQ.applyBodyAppends(md.body,{decisionLog:[`**${MQ.todayISO()}** — ${v}`],actionLog:[],openQuestionsLog:[]});markDirty(filename);}}},{label:'Skip',fn:()=>{}}]}); }
  }
}

function toggleActionQueue(filename, idx, btn) {
  const md = App.mds[filename];
  if (!md?.frontMatter?.actions) return;
  const action = md.frontMatter.actions[idx];
  if (action.queued) {
    action.queued = false;
    App.queue = App.queue.filter(q => !(q.filename===filename && q.description===action.description));
    btn.textContent = 'queue'; btn.classList.remove('queued');
  } else {
    if (buildQueueItems().length >= App.systemConfig.queue_cap) {
      showModal({title:'Queue is full',body:`${App.systemConfig.queue_cap} items queued. Add anyway?`,
        actions:[{label:'Add anyway',type:'primary',fn:()=>doQueueToggle(filename,idx,btn,action)},{label:'Cancel',fn:()=>{}}]});
      return;
    }
    doQueueToggle(filename, idx, btn, action);
  }
  markDirty(filename); markDirty('_queue');
}
function doQueueToggle(filename, idx, btn, action) {
  action.queued = true;
  App.queue.push({filename, description: action.description});
  btn.textContent = 'queued'; btn.classList.add('queued');
  markDirty(filename); markDirty('_queue');
}

// ── Action drag-to-reorder within Concept Overview ───────────────────────────
function onActionDragStart(e, filename, idx) {
  App.actionDragSrc = idx;
  e.dataTransfer.effectAllowed = 'move';
  e.currentTarget.classList.add('action-dragging');
}
function onActionDragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('action-drag-over');
}
function onActionDrop(e, filename, tgtIdx) {
  e.preventDefault();
  const srcIdx = App.actionDragSrc;
  if (srcIdx === null || srcIdx === tgtIdx) return;
  const md = App.mds[filename];
  if (!md?.frontMatter?.actions) return;
  const actions = md.frontMatter.actions;
  const [moved] = actions.splice(srcIdx, 1);
  actions.splice(tgtIdx, 0, moved);
  // Recalculate position fields
  actions.forEach((a, i) => a.position = i + 1);
  markDirty(filename);
  renderConceptOverview();
}
function onActionDragEnd(e) {
  document.querySelectorAll('.concept-action-row').forEach(r => {
    r.classList.remove('action-dragging', 'action-drag-over');
  });
  App.actionDragSrc = null;
}

function addAction(filename) {
  const md = App.mds[filename];
  if (!md) return;
  if (!md.frontMatter.actions) md.frontMatter.actions = [];
  md.frontMatter.actions.push({ description:'', type:'task', state:'open', position: md.frontMatter.actions.length+1 });
  markDirty(filename);
  renderConceptOverview();
}

function removeAction(filename, idx) {
  const md = App.mds[filename];
  if (!md?.frontMatter?.actions) return;
  const a = md.frontMatter.actions[idx];
  if (a.queued) { App.queue = App.queue.filter(q=>!(q.filename===filename&&q.description===a.description)); markDirty('_queue'); }
  md.frontMatter.actions.splice(idx,1);
  md.frontMatter.actions.forEach((a,i)=>a.position=i+1);
  markDirty(filename);
  renderConceptOverview();
}

function addTagOnEnter(e, filename, field, listId) {
  if (e.key === 'Escape') { hideTagAutocomplete(listId); return; }
  if (e.key !== 'Enter') return;
  const val = e.target.value.trim(); if (!val) return;
  const md = App.mds[filename]; if (!md) return;
  if (!md.frontMatter[field]) md.frontMatter[field] = [];
  if (!md.frontMatter[field].includes(val)) {
    md.frontMatter[field].push(val);
    markDirty(filename);
  }
  e.target.value = '';
  hideTagAutocomplete(listId);
  renderConceptOverview();
}

function removeTag(filename, field, idx) {
  const md = App.mds[filename]; if (!md) return;
  md.frontMatter[field].splice(idx,1);
  markDirty(filename);
  renderConceptOverview();
}

// ─── MODAL ─────────────────────────────────────────────────────────────────

function showModal({ title, body, input, actions }) {
  return new Promise(resolve => {
    const overlay = document.getElementById('modal-overlay');
    const box = document.getElementById('modal-box');
    box.innerHTML = `<div class="modal-title">${title}</div><div class="modal-body">${body}</div>`;
    let inputEl = null;
    if (input) {
      inputEl = document.createElement('input');
      inputEl.className = 'modal-input field-input';
      inputEl.placeholder = input.placeholder||'';
      inputEl.value = input.value||'';
      box.appendChild(inputEl);
    }
    const actionsEl = document.createElement('div');
    actionsEl.className = 'modal-actions';
    actions.forEach(action => {
      const btn = document.createElement('button');
      btn.className = 'modal-btn' + (action.type ? ' '+action.type : '');
      btn.textContent = action.label;
      btn.onclick = () => { overlay.classList.add('hidden'); const v = inputEl?.value; action.fn(v); resolve(v); };
      actionsEl.appendChild(btn);
    });
    box.appendChild(actionsEl);
    overlay.classList.remove('hidden');
    if (inputEl) inputEl.focus();
  });
}

function showConflictModal(filename) {
  // Standalone implementation — does not use showModal's input-value resolution path.
  // Two buttons resolve the promise explicitly with 'skip' or 'overwrite'.
  // 'skip' (Keep disk version) is the safe default — rendered first, receives focus.
  return new Promise(resolve => {
    const overlay = document.getElementById('modal-overlay');
    const box = document.getElementById('modal-box');
    box.innerHTML = `
      <div class="modal-title">File modified externally</div>
      <div class="modal-body">
        <strong>${esc(filename)}</strong> was modified outside the viewer since this session started.
        Your viewer changes will overwrite those external changes if you proceed.
      </div>
      <div class="modal-actions">
        <button class="modal-btn" id="conflict-skip-btn">Keep disk version</button>
        <button class="modal-btn danger" id="conflict-overwrite-btn">Overwrite with viewer changes</button>
      </div>`;
    overlay.classList.remove('hidden');
    document.getElementById('conflict-skip-btn').focus();
    document.getElementById('conflict-skip-btn').onclick = () => {
      overlay.classList.add('hidden');
      resolve('skip');
    };
    document.getElementById('conflict-overwrite-btn').onclick = () => {
      overlay.classList.add('hidden');
      resolve('overwrite');
    };
  });
}

// ─── MARKDOWN RENDERER ─────────────────────────────────────────────────────

function renderMarkdown(md, addIds) {
  let html = esc(md)
    .replace(/^## (.+)$/gm, (_,h) => `<h2${addIds?' id="body-'+slugId(h)+'"':''}>${h}</h2>`)
    .replace(/^### (.+)$/gm, (_,h) => `<h3>${h}</h3>`)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*?<\/li>\n?)+/gs, m => `<ul>${m}</ul>`)
    .replace(/\n\n(?!<)/g, '</p><p>');
  if (!html.startsWith('<')) html = '<p>' + html + '</p>';
  return html;
}

// ─── UTILITIES ─────────────────────────────────────────────────────────────

function esc(str) {
  if (str == null) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function slugId(str) { return String(str).toLowerCase().replace(/[^a-z0-9]/g,'-').replace(/-+/g,'-'); }

window.addEventListener('beforeunload', e => {
  if (Object.values(App.mds).some(md => md && typeof md === 'object' && md.dirty) || isQueueDirty()) {
    e.preventDefault(); e.returnValue = '';
  }
});
</script>
